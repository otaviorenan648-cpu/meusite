<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orçamento | Durand Tech System</title>
    <meta name="description" content="Simule seu orçamento de site, sistema ou app na Durand Tech System.">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <header id="header">
        <div class="container">
            <div class="logo"><h2>Durand Tech <span>System</span></h2></div>
            <a href="index.html" class="btn-secondary" style="border-color:#334155;color:#94a3b8"><i class="fa-solid fa-arrow-left"></i> Voltar</a>
        </div>
    </header>

    <section class="section-padding" style="margin-top:80px;background:#0f172a;color:#fff;min-height:100vh">
        <div class="container">
            <h2 class="section-title" style="color:#fff">Simule seu Orçamento</h2>
            <p class="section-subtitle" style="color:#94a3b8">Escolha o tipo de projeto e adicionais. Valor estimado na hora.</p>
            
            <div class="budget-box">
                <form id="form-orcamento">
                    <div class="form-group">
                        <label>Seu Nome</label>
                        <input type="text" id="nome" placeholder="Otavio Renan" required style="padding:12px;border-radius:5px;border:1px solid #334155;background:#0b1220;color:#fff">
                    </div>
                    <div class="form-group">
                        <label>WhatsApp</label>
                        <input type="tel" id="telefone" placeholder="(53) 99183-3588" required style="padding:12px;border-radius:5px;border:1px solid #334155;background:#0b1220;color:#fff">
                    </div>
                    <div class="form-group">
                        <label>E-mail</label>
                        <input type="email" id="email" placeholder="seu@email.com" required style="padding:12px;border-radius:5px;border:1px solid #334155;background:#0b1220;color:#fff">
                    </div>
                    <div class="form-group">
                        <label>Tipo de Projeto</label>
                        <select id="tipo-projeto" required>
                            <option value="0">Selecione...</option>
                            <option value="1500">Landing Page - a partir de R$ 1.500</option>
                            <option value="3500">Site Institucional - a partir de R$ 3.500</option>
                            <option value="6000">E-commerce - a partir de R$ 6.000</option>
                            <option value="8000">Sistema ERP/CRM - a partir de R$ 8.000</option>
                            <option value="10000">App Mobile - a partir de R$ 10.000</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Adicionais</label>
                        <div class="checkbox-group">
                            <label><input type="checkbox" class="adicional" value="800"> SEO Local (+ R$ 800)</label>
                            <label><input type="checkbox" class="adicional" value="1200"> Painel Admin (+ R$ 1.200)</label>
                            <label><input type="checkbox" class="adicional" value="600"> Integração WhatsApp (+ R$ 600)</label>
                            <label><input type="checkbox" class="adicional" value="1000"> Hospedagem + Domínio 1 ano (+ R$ 1.000)</label>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Descrição do projeto</label>
                        <textarea id="descricao" rows="4" placeholder="Conte mais sobre sua ideia..." style="padding:12px;border-radius:5px;border:1px solid #334155;background:#0b1220;color:#fff"></textarea>
                    </div>

                    <div class="budget-result">
                        <p>Valor estimado:</p>
                        <span id="valor-total">R$ 0,00</span>
                    </div>

                    <button type="submit" id="btn-fechar-orcamento" class="btn-primary">Enviar Orçamento no WhatsApp <i class="fa-brands fa-whatsapp"></i></button>
                </form>
            </div>
        </div>
    </section>

    <script src="index.js"></script>
</body>
</html>
